{{- if .Values.api.enabled }}
apiVersion: v1
kind: Service
metadata:
  name: {{ include "securefast.fullname" . }}-api
  namespace: {{ .Values.namespace }}
  labels:
    {{- include "securefast.api.labels" . | nindent 4 }}
spec:
  type: {{ .Values.api.service.type }}
  ports:
    - port: {{ .Values.api.service.port }}
      targetPort: http
      protocol: TCP
      name: http
  selector:
    {{- include "securefast.selectorLabels" . | nindent 4 }}
    app.kubernetes.io/component: api
{{- end }}
