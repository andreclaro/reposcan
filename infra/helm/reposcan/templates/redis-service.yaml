{{- if .Values.redis.enabled }}
apiVersion: v1
kind: Service
metadata:
  name: {{ include "reposcan.fullname" . }}-redis
  namespace: {{ .Values.namespace }}
  labels:
    {{- include "reposcan.redis.labels" . | nindent 4 }}
spec:
  type: {{ .Values.redis.service.type }}
  ports:
    - port: {{ .Values.redis.service.port }}
      targetPort: redis
      protocol: TCP
      name: redis
  selector:
    {{- include "reposcan.selectorLabels" . | nindent 4 }}
    app.kubernetes.io/component: redis
{{- end }}
