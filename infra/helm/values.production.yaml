# Production environment values for Hetzner K8s + Vercel deployment
#
# Architecture:
# - Next.js frontend: Deployed on Vercel
# - Go API: Deployed on Hetzner Kubernetes
# - Redis: Deployed on Hetzner Kubernetes
# - Celery Worker: Deployed on Hetzner Kubernetes
#
# Note: CORS is typically NOT needed since requests flow:
# Browser -> Vercel (Next.js API routes) -> Go API (server-to-server)
# Only enable CORS if you need direct browser access to the API.

global:
  # CORS origins - ONLY needed for direct browser access to API
  # Leave as "*" or empty since Vercel backend -> Go API is server-to-server
  # If you need direct browser access, set to: "https://your-app.vercel.app"
  corsAllowedOrigins: "*"

api:
  replicaCount: 3
  image:
    repository: reposcan-api
    tag: stable
    pullPolicy: Always
  
  ingress:
    enabled: true
    className: nginx
    annotations:
      cert-manager.io/cluster-issuer: "letsencrypt-prod"
      nginx.ingress.kubernetes.io/rate-limit: "100"
      nginx.ingress.kubernetes.io/rate-limit-window: "1m"
      # CORS headers handled by Go API, not ingress
    hosts:
      - host: api.reposcan.example.com
        paths:
          - path: /
            pathType: Prefix
    tls:
      - secretName: reposcan-api-tls
        hosts:
          - api.reposcan.example.com
  
  autoscaling:
    enabled: true
    minReplicas: 3
    maxReplicas: 10
    targetCPUUtilizationPercentage: 70
    targetMemoryUtilizationPercentage: 80
  
  resources:
    limits:
      cpu: 2000m
      memory: 2Gi
    requests:
      cpu: 500m
      memory: 512Mi

worker:
  replicaCount: 5
  image:
    repository: sec-audit-worker
    tag: stable
    pullPolicy: Always
  concurrency: 100
  
  autoscaling:
    enabled: true
    minReplicas: 5
    maxReplicas: 20
    targetCPUUtilizationPercentage: 70
  
  resources:
    limits:
      cpu: 4000m
      memory: 8Gi
    requests:
      cpu: 1000m
      memory: 2Gi

redis:
  persistence:
    enabled: true
    size: 20Gi
    storageClass: fast-ssd  # Use fast storage for production
  
  resources:
    limits:
      cpu: 1000m
      memory: 1Gi
    requests:
      cpu: 250m
      memory: 256Mi

# Pod disruption budget for high availability
podDisruptionBudget:
  enabled: true
  minAvailable: 2
