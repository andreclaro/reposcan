# Staging environment values

api:
  replicaCount: 2
  image:
    tag: staging
    pullPolicy: Always
  
  ingress:
    enabled: true
    className: nginx
    annotations:
      cert-manager.io/cluster-issuer: "letsencrypt-staging"
    hosts:
      - host: staging.reposcan.example.com
        paths:
          - path: /
            pathType: Prefix
    tls:
      - secretName: reposcan-api-tls
        hosts:
          - staging.reposcan.example.com
  
  autoscaling:
    enabled: true
    minReplicas: 2
    maxReplicas: 5

worker:
  replicaCount: 3
  image:
    tag: staging
    pullPolicy: Always
  concurrency: 50
  
  autoscaling:
    enabled: true
    minReplicas: 3
    maxReplicas: 10

redis:
  persistence:
    enabled: true
    size: 5Gi
