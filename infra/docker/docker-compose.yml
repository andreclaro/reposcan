# Run from repo root: docker compose -f infra/docker/docker-compose.yml up -d
# Or from this directory: docker compose -f docker-compose.yml up -d (paths assume cwd is infra/)
services:
  postgres:
    image: postgres:16-alpine
    ports:
      - "5433:5432"
    environment:
      - POSTGRES_USER=${POSTGRES_USER:-postgres}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD:-postgres}
      - POSTGRES_DB=${POSTGRES_DB:-sec_audit}
    command: postgres -c max_connections=200
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 3s
      retries: 5
    # Resource limits
    deploy:
      resources:
        limits:
          cpus: '1'
          memory: 1G
        reservations:
          cpus: '0.25'
          memory: 256M

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5
    # Resource limits
    deploy:
      resources:
        limits:
          cpus: '0.5'
          memory: 512M
        reservations:
          cpus: '0.1'
          memory: 128M

  api:
    build:
      context: ../..
      dockerfile: infra/docker/Dockerfile.api
    ports:
      - "8000:8000"
    env_file:
      - ../../frontend/.env.local
    environment:
      - REDIS_URL=redis://redis:6379/0
      - RESULTS_DIR=/work/results
      # Override DATABASE_URL to use the postgres service name instead of localhost
      # NOTE: Use internal port 5432 (not host-mapped 5433) for container-to-container communication
      - DATABASE_URL=postgresql://postgres:postgres@postgres:5432/sec_audit
    volumes:
      - ../../backend-worker/src:/work
      - results_data:/work/results
    depends_on:
      redis:
        condition: service_healthy
      postgres:
        condition: service_healthy
    dns:
      - 8.8.8.8
      - 8.8.4.4
    command: ./api
    # Resource limits
    deploy:
      resources:
        limits:
          cpus: '1'
          memory: 1G
        reservations:
          cpus: '0.25'
          memory: 256M

  worker:
    build:
      context: ../..
      dockerfile: infra/docker/Dockerfile.worker
    env_file:
      - ../../frontend/.env.local
    environment:
      - REDIS_URL=redis://redis:6379/0
      - RESULTS_DIR=/work/results
      - PORT=8080
      # Override DATABASE_URL to use the postgres service name instead of localhost
      # NOTE: Use internal port 5432 (not host-mapped 5433) for container-to-container communication
      - DATABASE_URL=postgresql://postgres:postgres@postgres:5432/sec_audit
    volumes:
      - ../../backend-worker/src:/work
      - results_data:/work/results
    depends_on:
      redis:
        condition: service_healthy
      postgres:
        condition: service_healthy
    dns:
      - 8.8.8.8
      - 8.8.4.4
    # Run as root for file permissions, but ensure results dir is writable
    user: root
    entrypoint: []
    command: >
      sh -c "mkdir -p /work/results && chmod 777 /work/results &&
             celery -A worker.scan_worker worker --loglevel=info --concurrency=50"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/"]
      interval: 10s
      timeout: 5s
      retries: 5
    # Resource limits
    deploy:
      resources:
        limits:
          cpus: '2'
          memory: 4G
        reservations:
          cpus: '0.5'
          memory: 1G

volumes:
  postgres_data:
  redis_data:
  results_data:
