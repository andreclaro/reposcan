# Railway Configuration for Worker Service
# https://docs.railway.com/reference/config-as-code
#
# IMPORTANT: In Railway dashboard, set this service's config file path to:
#   /railway.worker.toml
#
# This file configures the Celery worker using docker/Dockerfile (full scanner image)

[build]
builder = "DOCKERFILE"
dockerfilePath = "./docker/Dockerfile"

[deploy]
# Start the Celery worker with 50 concurrent tasks
startCommand = "celery -A worker.scan_worker worker --loglevel=info --concurrency=50"

# Workers don't need healthchecks in the traditional sense
# but Railway requires a command that keeps running
# healthcheckPath = "/health"
# healthcheckTimeout = 60

restartPolicyType = "on_failure"
restartPolicyMaxRetries = 10

# Workers typically run as single replicas
# Scale vertically (more CPU/RAM) rather than horizontally
numReplicas = 1

# IMPORTANT: Workers need more resources due to scanner tools
# (semgrep, trivy, tfsec, node, go, rust, etc.)
[deploy.resources]
memory = "4Gi"
cpu = 2

# Workers should not sleep - they need to process jobs immediately
[deploy.sleep]
enabled = false

# Deployment teardown settings
[deploy.teardown]
# Give running scans time to complete before terminating
overlapSeconds = 60
drainingSeconds = 300  # 5 minutes to finish current scans
