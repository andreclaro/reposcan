{{- if .Values.secrets.create }}
apiVersion: v1
kind: Secret
metadata:
  name: {{ include "securefast.fullname" . }}-secrets
  namespace: {{ .Values.namespace }}
  labels:
    {{- include "securefast.labels" . | nindent 4 }}
type: Opaque
stringData:
  DATABASE_URL: {{ .Values.global.databaseUrl | quote }}
  ANTHROPIC_API_KEY: {{ .Values.global.anthropicApiKey | quote }}
  OPENAI_API_KEY: {{ .Values.global.openaiApiKey | quote }}
  KIMI_API_KEY: {{ .Values.global.kimiApiKey | quote }}
  AWS_ACCESS_KEY_ID: {{ .Values.global.awsAccessKeyId | quote }}
  AWS_SECRET_ACCESS_KEY: {{ .Values.global.awsSecretAccessKey | quote }}
{{- end }}
