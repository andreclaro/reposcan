version: '3.8'

services:
  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  api:
    build:
      context: .
      dockerfile: Dockerfile.api
    ports:
      - "8000:8000"
    environment:
      - REDIS_URL=redis://redis:6379/0
      - RESULTS_DIR=/work/results
    volumes:
      - .:/work
      - results_data:/work/results
    depends_on:
      redis:
        condition: service_healthy
    command: uvicorn api.main:app --host 0.0.0.0 --port 8000 --reload

  worker:
    build:
      context: .
      dockerfile: Dockerfile
    environment:
      - REDIS_URL=redis://redis:6379/0
      - RESULTS_DIR=/work/results
    volumes:
      - .:/work
      - results_data:/work/results
      - /var/run/docker.sock:/var/run/docker.sock  # For Docker-in-Docker (Trivy scans)
    depends_on:
      redis:
        condition: service_healthy
    command: celery -A tasks.scan_worker worker --loglevel=info --concurrency=2

volumes:
  redis_data:
  results_data:
