<svg viewBox="0 0 800 600" fill="none" xmlns="http://www.w3.org/2000/svg">
  <!-- Background Elements -->
  <circle cx="400" cy="300" r="250" fill="#f1f5f9" opacity="0.5"/>
  <circle cx="400" cy="300" r="200" fill="#e2e8f0" opacity="0.3"/>
  
  <!-- Main Shield -->
  <path d="M400 120 L520 180 V300 C520 400 400 480 400 480 C400 480 280 400 280 300 V180 L400 120Z" 
        fill="#0f172a" stroke="#3b82f6" stroke-width="4"/>
  
  <!-- Inner Shield Glow -->
  <path d="M400 140 L500 190 V290 C500 370 400 440 400 440 C400 440 300 370 300 290 V190 L400 140Z" 
        fill="#1e293b"/>
  
  <!-- Checkmark -->
  <path d="M360 280 L390 310 L450 240" stroke="#10b981" stroke-width="12" stroke-linecap="round" stroke-linejoin="round"/>
  
  <!-- Code Brackets Left -->
  <g opacity="0.8">
    <path d="M180 250 L140 300 L180 350" stroke="#64748b" stroke-width="8" stroke-linecap="round" stroke-linejoin="round"/>
    <path d="M220 250 L260 300 L220 350" stroke="#64748b" stroke-width="8" stroke-linecap="round" stroke-linejoin="round"/>
    <!-- Code lines -->
    <line x1="160" y1="290" x2="200" y2="290" stroke="#64748b" stroke-width="4" opacity="0.5"/>
    <line x1="165" y1="305" x2="195" y2="305" stroke="#64748b" stroke-width="4" opacity="0.5"/>
    <line x1="170" y1="320" x2="190" y2="320" stroke="#64748b" stroke-width="4" opacity="0.5"/>
  </g>
  
  <!-- Code Brackets Right -->
  <g opacity="0.8">
    <path d="M580 250 L540 300 L580 350" stroke="#64748b" stroke-width="8" stroke-linecap="round" stroke-linejoin="round"/>
    <path d="M620 250 L660 300 L620 350" stroke="#64748b" stroke-width="8" stroke-linecap="round" stroke-linejoin="round"/>
    <!-- Code lines -->
    <line x1="560" y1="290" x2="600" y2="290" stroke="#64748b" stroke-width="4" opacity="0.5"/>
    <line x1="565" y1="305" x2="595" y2="305" stroke="#64748b" stroke-width="4" opacity="0.5"/>
    <line x1="570" y1="320" x2="590" y2="320" stroke="#64748b" stroke-width="4" opacity="0.5"/>
  </g>
  
  <!-- Floating Security Icons -->
  <!-- Lock Icon Top Left -->
  <g transform="translate(120, 150)">
    <rect x="10" y="20" width="30" height="25" rx="3" fill="#3b82f6"/>
    <path d="M15 20 V12 A10 10 0 0 1 35 12 V20" stroke="#3b82f6" stroke-width="4" fill="none"/>
    <circle cx="25" cy="32" r="3" fill="white"/>
  </g>
  
  <!-- Key Icon Top Right -->
  <g transform="translate(640, 140)">
    <circle cx="15" cy="15" r="10" stroke="#f59e0b" stroke-width="4" fill="none"/>
    <line x1="22" y1="22" x2="40" y2="40" stroke="#f59e0b" stroke-width="4" stroke-linecap="round"/>
    <line x1="32" y1="38" x2="40" y2="38" stroke="#f59e0b" stroke-width="4" stroke-linecap="round"/>
    <line x1="36" y1="34" x2="36" y2="42" stroke="#f59e0b" stroke-width="4" stroke-linecap="round"/>
  </g>
  
  <!-- Bug Icon Bottom Left -->
  <g transform="translate(100, 400)">
    <circle cx="25" cy="25" r="12" stroke="#ef4444" stroke-width="3" fill="none"/>
    <line x1="25" y1="13" x2="25" y2="5" stroke="#ef4444" stroke-width="3" stroke-linecap="round"/>
    <line x1="25" y1="37" x2="25" y2="45" stroke="#ef4444" stroke-width="3" stroke-linecap="round"/>
    <line x1="13" y1="25" x2="5" y2="25" stroke="#ef4444" stroke-width="3" stroke-linecap="round"/>
    <line x1="37" y1="25" x2="45" y2="25" stroke="#ef4444" stroke-width="3" stroke-linecap="round"/>
    <line x1="16" y1="16" x2="10" y2="10" stroke="#ef4444" stroke-width="3" stroke-linecap="round"/>
    <line x1="34" y1="34" x2="40" y2="40" stroke="#ef4444" stroke-width="3" stroke-linecap="round"/>
    <line x1="34" y1="16" x2="40" y2="10" stroke="#ef4444" stroke-width="3" stroke-linecap="round"/>
    <line x1="16" y1="34" x2="10" y2="40" stroke="#ef4444" stroke-width="3" stroke-linecap="round"/>
  </g>
  
  <!-- Shield with Check Bottom Right -->
  <g transform="translate(650, 380)">
    <path d="M25 5 L45 15 V35 C45 45 25 55 25 55 C25 55 5 45 5 35 V15 L25 5Z" 
          stroke="#10b981" stroke-width="3" fill="none"/>
    <path d="M15 30 L22 37 L35 23" stroke="#10b981" stroke-width="3" stroke-linecap="round" stroke-linejoin="round" fill="none"/>
  </g>
  
  <!-- Container Box Left -->
  <g transform="translate(140, 320)">
    <rect x="0" y="10" width="50" height="40" rx="4" stroke="#6366f1" stroke-width="3" fill="none"/>
    <line x1="0" y1="20" x2="50" y2="20" stroke="#6366f1" stroke-width="2"/>
    <circle cx="10" cy="15" r="2" fill="#6366f1"/>
    <circle cx="18" cy="15" r="2" fill="#6366f1"/>
    <circle cx="26" cy="15" r="2" fill="#6366f1"/>
  </g>
  
  <!-- Cloud Icon Right -->
  <g transform="translate(620, 280)">
    <path d="M10 35 A12 12 0 0 1 15 15 A15 15 0 0 1 45 15 A12 12 0 0 1 50 35" 
          stroke="#8b5cf6" stroke-width="3" fill="none" stroke-linecap="round"/>
    <line x1="20" y1="45" x2="40" y2="45" stroke="#8b5cf6" stroke-width="3" stroke-linecap="round"/>
    <line x1="25" y1="52" x2="35" y2="52" stroke="#8b5cf6" stroke-width="3" stroke-linecap="round"/>
  </g>
  
  <!-- Scanning Lines Effect -->
  <line x1="250" y1="480" x2="550" y2="480" stroke="#3b82f6" stroke-width="2" stroke-dasharray="8 4" opacity="0.4">
    <animate attributeName="stroke-dashoffset" from="0" to="24" dur="2s" repeatCount="indefinite"/>
  </line>
  
  <!-- Connection Dots -->
  <circle cx="280" cy="200" r="4" fill="#3b82f6" opacity="0.6"/>
  <circle cx="520" cy="200" r="4" fill="#3b82f6" opacity="0.6"/>
  <circle cx="280" cy="400" r="4" fill="#3b82f6" opacity="0.6"/>
  <circle cx="520" cy="400" r="4" fill="#3b82f6" opacity="0.6"/>
</svg>
