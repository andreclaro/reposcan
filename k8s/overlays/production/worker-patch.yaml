apiVersion: apps/v1
kind: Deployment
metadata:
  name: worker
  namespace: secaudit
spec:
  replicas: 5  # More workers for production
  template:
    spec:
      containers:
        - name: worker
          resources:
            requests:
              memory: "1Gi"
              cpu: "1000m"
            limits:
              memory: "4Gi"
              cpu: "4000m"
